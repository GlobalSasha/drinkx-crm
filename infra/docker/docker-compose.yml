services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: drinkx
      POSTGRES_PASSWORD: drinkx
      POSTGRES_DB: drinkx_crm
    ports:
      - "5432:5432"
    volumes:
      - drinkx_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drinkx -d drinkx_crm"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - drinkx_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  drinkx_pg_data:
  drinkx_redis_data:
