# nginx vhost for crm.drinkx.tech
# Proxies / → web (Next.js on :3000) and /api/* → API (FastAPI on :8000)
# TLS managed by certbot — it edits this file on first `certbot --nginx` run.
#
# Install:
#   sudo cp infra/production/nginx/crm.drinkx.tech.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/crm.drinkx.tech.conf /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d crm.drinkx.tech

server {
    listen 80;
    listen [::]:80;
    server_name crm.drinkx.tech;

    # certbot challenge files
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Everything else → HTTPS (certbot adds this redirect itself)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crm.drinkx.tech;

    # TLS certs — certbot fills these in
    # ssl_certificate /etc/letsencrypt/live/crm.drinkx.tech/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/crm.drinkx.tech/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Body size for file uploads (КП, визитки)
    client_max_body_size 25M;

    # API → FastAPI on :8000 (strip /api prefix)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # WebSocket для enrichment progress + notifications
    location /ws/ {
        proxy_pass http://127.0.0.1:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;  # long-lived
    }

    # Everything else → Next.js on :3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # /auth/callback returns several Set-Cookie headers from Supabase
        # (sb-access-token + sb-refresh-token + chunked PKCE auth-token).
        # Together they overflow the default 8K proxy header buffer and
        # nginx returns 502, which triggers the maintenance fallback.
        # 16K covers current Supabase JS 2.x cookie sizes with headroom.
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 32k;
    }
}
