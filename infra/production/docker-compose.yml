# Production stack — runs on the bare-metal Ubuntu server (77.105.168.227 / crm.drinkx.tech)
# Single docker-compose project: postgres + redis + api + worker + beat + web.
# nginx runs OUTSIDE Docker (host nginx) and reverse-proxies to web/api on localhost.
# This keeps TLS termination + cert renewal simple.
#
# Usage:
#   cd /opt/drinkx-crm
#   cp infra/production/.env.example infra/production/.env
#   # edit .env with real secrets
#   docker compose -f infra/production/docker-compose.yml --env-file infra/production/.env up -d --build
#
# Updates:
#   git pull && docker compose -f infra/production/docker-compose.yml up -d --build

name: drinkx

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-drinkx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?postgres password required}
      POSTGRES_DB: ${POSTGRES_DB:-drinkx_crm}
    volumes:
      - drinkx_pg:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"   # bind to localhost only, never expose to internet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-drinkx} -d ${POSTGRES_DB:-drinkx_crm}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - drinkx_redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-drinkx}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-drinkx_crm}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["https://crm.drinkx.tech"]'
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      MIMO_API_KEY: ${MIMO_API_KEY}
      MIMO_BASE_URL: ${MIMO_BASE_URL:-https://api.xiaomimimo.com/v1}
      MIMO_MODEL_PRO: ${MIMO_MODEL_PRO:-mimo-v2-pro}
      MIMO_MODEL_FLASH: ${MIMO_MODEL_FLASH:-mimo-v2-flash}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      APIFY_TOKEN: ${APIFY_TOKEN}
      CRM_AI_BACKEND: ${CRM_AI_BACKEND:-mimo}
      LLM_FALLBACK_CHAIN: ${LLM_FALLBACK_CHAIN:-["mimo","anthropic","gemini","deepseek"]}
      SENTRY_DSN: ${SENTRY_DSN_API}
      AI_MONTHLY_BUDGET_USD: ${AI_MONTHLY_BUDGET_USD:-200}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Celery worker — created as separate service so it can scale independently.
  # Currently no celery tasks defined; enable when Sprint 1.3 starts.
  # worker:
  #   build:
  #     context: ../../apps/api
  #     dockerfile: Dockerfile
  #   restart: unless-stopped
  #   command: ["uv", "run", "celery", "-A", "app.celery_app", "worker", "-l", "INFO"]
  #   environment:
  #     <<: *api-env
  #   depends_on:
  #     - postgres
  #     - redis

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://crm.drinkx.tech/api
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY}
      NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN_WEB}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api

volumes:
  drinkx_pg:
  drinkx_redis:
