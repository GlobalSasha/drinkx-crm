name: Deploy to crm.drinkx.tech

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 25m headroom: the web build alone runs ~10-15m and crept to 14m41s on the
    # Wave 2 deploy; the КП feature adds more frontend. 15m was cutting it close.
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      # The server sits in a Russian datacenter and reaches github.com only
      # intermittently: TCP connects, the TLS handshake then hangs forever, so
      # `git fetch` on the box wedged and two deploys died with "Broken pipe"
      # (2026-07-14). The runner always has GitHub — so it ships the code and
      # the server never talks to GitHub at all.
      #
      # No --delete: `git reset --hard` never removed untracked files either,
      # and a stray --delete here would wipe infra/production/.env (the prod
      # secrets, deliberately not in git). .env is excluded twice on purpose.
      - name: Ship code to server
        run: |
          rsync -az --timeout=60 \
            -e "ssh -i ~/.ssh/deploy_key -o ServerAliveInterval=30 -o ServerAliveCountMax=10" \
            --exclude='.git/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='infra/production/.env' \
            --exclude='node_modules/' \
            --exclude='.next/' \
            --exclude='__pycache__/' \
            --exclude='.venv/' \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/drinkx-crm/"

      # ServerAliveInterval keeps the session alive across the ~12-15m build,
      # which prints nothing for minutes at a time.
      - name: Trigger deploy
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
            -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "DEPLOY_SHA='${{ github.sha }}' bash /opt/drinkx-crm/infra/production/deploy.sh"

      - name: Verify health
        run: |
          # Poll with retries: the API container runs `alembic upgrade head`
          # before uvicorn starts, so on deploys with migrations it can take
          # more than a few seconds to answer. A single early check raced that
          # boot and produced false-negative 502s.
          check() {
            # $1 = label, $2 = url
            for i in $(seq 1 20); do
              CODE=$(curl -s -o /dev/null -w '%{http_code}' "$2" || echo 000)
              if [ "$CODE" = "200" ]; then
                echo "$1 HTTP 200 (attempt $i)"
                return 0
              fi
              echo "$1 HTTP $CODE — retry $i/20"
              sleep 3
            done
            echo "$1 did not become healthy" >&2
            return 1
          }

          # "/" is an entry point, not a page: middleware 307s it to /today or
          # /sign-in depending on the session. Probe a page that returns 200.
          check "Web" https://crm.drinkx.tech/sign-in || exit 1
          check "API" https://crm.drinkx.tech/api/health || exit 1

          echo "✅ Deploy verified"
