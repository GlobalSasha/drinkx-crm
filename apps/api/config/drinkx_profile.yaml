company:
  name: DrinkX
  product: |
    Умная кофе-станция self-service: стабильная чашка в условиях розничного
    магазина, АЗС или ТРЦ. Управляется через приложение, мониторит расход
    и качество в режиме реального времени.
  positioning: |
    Не вендинг и не кафе. Ритейлер ставит станцию у входа или на прикассовой
    зоне, получает ~30-80 чашек/день дополнительной выручки и точки роста
    среднего чека на ~5%. Сервис и расходники — на нас.
  icp:
    primary:
      - Сети продуктовой розницы и дискаунтеры (50+ магазинов)
      - АЗС с собственным foodservice
      - Аптечные сети с трафиком в ТРЦ
      - QSR / fast-food (как дополнительное оборудование)
    secondary:
      - Корпоративные офисы 200+ человек
      - Гостиничные сети
  fit_score_anchors:
    "10": Топ-3 ритейлер с подтверждённым пилотом, ЛПР контактен
    "7-9": Сеть >100 точек, есть foodservice, без подтверждённого ЛПР
    "4-6": Средняя сеть, потенциал есть, но нет конкретики
    "1-3": Узкий формат, без foodservice или закрытая закупка
    "0": Не ICP — НКО, госсектор, монобренд кафе с собственной системой
common_objections:
  - "У нас уже есть машина → как интегрируемся, чем отличаемся"
  - "Дорого → unit economics, чашка vs альтернативы, ROI за 6 месяцев"
  - "Сложно обслуживать → удалённый мониторинг, сервис в течение 24h"
  - "Не наш формат → кейсы из релевантного сегмента"
key_signals_to_extract:
  - Размер сети (число точек, регионы присутствия)
  - Наличие или отсутствие foodservice / horeca-зоны
  - Вакансии на категорийного менеджера food/non-food (LinkedIn, hh.ru)
  - Пилоты с другим оборудованием — сигнал зрелости, не блокер
  - Открытие новых точек или реновация — горячий момент для входа
